<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sejarah Sumedang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f8f8f8;
    line-height:1.8;
}

/* HEADER */

.hero{
    background:#0D2B5C;
    color:white;
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:3rem;
    margin-bottom:10px;
}

/* KONTEN */

.container{
    max-width:1100px;
    margin:auto;
    padding:50px 20px;
}

/* FOTO SEJARAH */

.foto-sejarah{
    text-align:center;
    margin-bottom:40px;
}

.foto-sejarah img{
    width:900px;
    max-width:100%;
    height:auto;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.isi-sejarah{
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.isi-sejarah h2{
    color:#0D2B5C;
    margin-bottom:20px;
}

.isi-sejarah p{
    text-align:justify;
    margin-bottom:15px;
    color:#333;
}

/* TOMBOL KEMBALI */

.kembali{
    text-align:center;
    margin-top:40px;
}

.kembali a{
    display:inline-block;
    background:#0D2B5C;
    color:white;
    text-decoration:none;
    padding:14px 30px;
    border-radius:50px;
    transition:.3s;
}

.kembali a:hover{
    background:#17448a;
}

/* RESPONSIVE */

@media(max-width:768px){

.hero h1{
    font-size:2rem;
}

.isi-sejarah{
    padding:25px;
}

}

</style>
</head>
<body>

<section class="hero">
    <h1>Sejarah Sumedang</h1>
    <p>Mengenal perjalanan panjang Sumedang dari masa kerajaan hingga sekarang.</p>
</section>

<div class="container">

    <div class="foto-sejarah">
        <img src="gambar/poto 3.jpg" alt="Sejarah Sumedang">
    </div>

    <div class="kembali">
        <a href="index.html">← Kembali ke Beranda</a>
    </div>

</div>

</body>
</html>
